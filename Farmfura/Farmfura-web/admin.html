<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmfura - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .page { display: none; } .page.active { display: block; }
        .nav-link { transition: all 0.2s ease; padding: 0.5rem 0.75rem; border-radius: 0.375rem; white-space: nowrap; color: #374151; cursor: pointer; }
        .nav-link:hover { background-color: #f3f4f6; color: #111827; }
        .nav-link.active { background-color: #2563eb; color: white; font-weight: 600; }
        .modal-backdrop { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.6); display: none; align-items: center; justify-content: center; z-index: 120; opacity: 0; transition: opacity 0.3s ease; }
        .modal-backdrop.visible { display: flex; opacity: 1; }
        .modal-content { background: white; padding: 1.5rem; border-radius: 0.5rem; width: 90%; max-width: 500px; }
        .kpi-card { background-color: white; padding: 1.5rem; border-radius: 0.75rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

    <div id="admin-login-wrapper" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <div class="bg-white p-8 rounded-lg shadow-md">
                <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Admin Panel Login</h2>
                <input type="password" id="admin-password" placeholder="Password" class="w-full p-3 border rounded-md" required>
                <button id="admin-login-btn" class="mt-4 w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700">Login</button>
            </div>
        </div>
    </div>
    
    <div id="admin-panel" class="hidden">
        <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-3">
                    <h1 class="text-xl font-bold text-gray-800">🌱 Admin Panel</h1>
                    <nav class="hidden md:flex items-center space-x-2 text-sm font-medium flex-wrap justify-center">
                        <a href="#dashboard-page" class="nav-link active">Dashboard</a>
                        <a href="#employees-page" class="nav-link">Employees</a>
                        <a href="#farmer-prices-page" class="nav-link">Farmer Prices</a>
                    </nav>
                    <a href="index.html" class="text-sm font-semibold text-gray-600 hover:text-green-700">← Portal Hub</a>
                </div>
            </div>
        </header>
        <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div id="dashboard-page" class="page active"></div>
            <div id="employees-page" class="page"></div>
            <div id="farmer-prices-page" class="page"></div>
        </main>
    </div>
    
    <div id="admin-modal" class="modal-backdrop">
        <div id="admin-modal-content" class="modal-content"></div>
    </div>
    <div id="toast-message" class="fixed bottom-4 left-1/2 -translate-x-1/2 p-4 rounded-lg shadow-xl text-white bg-green-600 transition-opacity duration-300 opacity-0 z-[150]"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const ADMIN_PASSWORD = "admin"; // Simple password for demo

    // DOM Elements
    const loginWrapper = document.getElementById('admin-login-wrapper');
    const adminPanel = document.getElementById('admin-panel');
    const loginBtn = document.getElementById('admin-login-btn');
    const toastMessage = document.getElementById('toast-message');

    // Utility Functions
    const showToast = (message) => {
        toastMessage.textContent = message;
        toastMessage.classList.remove('opacity-0');
        setTimeout(() => toastMessage.classList.add('opacity-0'), 3000);
    };

    const switchPage = (pageId) => {
        document.querySelectorAll('#admin-panel .page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('#admin-panel .nav-link').forEach(l => l.classList.remove('active'));
        document.querySelector(`a[href="#${pageId}"]`).classList.add('active');
    };

    // Render Functions
    function renderDashboard() {
        const employees = JSON.parse(localStorage.getItem('farmfura_employees')) || [];
        const pendingCollabs = employees.filter(e => e.status === 'Pending Collaboration').length;
        const pendingFarmers = (JSON.parse(localStorage.getItem('farmfura_farmer_submissions')) || []).filter(s => s.status === 'pending').length;

        document.getElementById('dashboard-page').innerHTML = `
            <h2 class="text-3xl font-bold text-gray-800 mb-6">System Overview</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="kpi-card"><div class="value text-purple-600">${pendingCollabs}</div><div class="label">Pending Collaborations</div></div>
                <div class="kpi-card"><div class="value text-green-600">${pendingFarmers}</div><div class="label">Pending Farmer Submissions</div></div>
            </div>`;
    }

    function renderEmployeesPage() {
        const employees = JSON.parse(localStorage.getItem('farmfura_employees')) || [];
        const pendingCollabs = employees.filter(e => e.status === 'Pending Collaboration');
        
        document.getElementById('employees-page').innerHTML = `
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Manage Personnel</h2>
            ${pendingCollabs.length > 0 ? `
            <div class="mb-8">
                <h3 class="text-xl font-semibold text-gray-700 mb-4">New Collaboration Requests</h3>
                <div class="bg-white rounded-lg shadow-md">
                    ${pendingCollabs.map(emp => `
                        <div class="p-4 border-b last:border-b-0 flex justify-between items-center">
                            <div>
                                <p class="font-bold">${emp.shopName}</p>
                                <p class="text-sm text-gray-600">${emp.phone} | ${emp.address}</p>
                            </div>
                            <div class="space-x-2">
                                <button class="action-btn bg-green-500 text-white px-3 py-1 text-xs rounded" data-action="approve-collab" data-id="${emp.id}">Approve</button>
                                <button class="action-btn bg-red-500 text-white px-3 py-1 text-xs rounded" data-action="reject-collab" data-id="${emp.id}">Reject</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
            ` : ''}
            `;
        document.querySelectorAll('.action-btn').forEach(btn => btn.addEventListener('click', handleEmployeeAction));
    }
    
    function renderFarmerPricesPage() { /* ... Unchanged from previous version ... */ }

    // Logic Functions
    function handleEmployeeAction(e) {
        const action = e.target.dataset.action;
        const employeeId = e.target.dataset.id;
        let employees = JSON.parse(localStorage.getItem('farmfura_employees'));
        const employee = employees.find(emp => emp.id === employeeId);

        if (!employee) return;

        if (action === 'approve-collab') {
            employee.status = 'Active';
            showToast(`${employee.shopName} collaboration approved.`);
        } else if (action === 'reject-collab') {
            employee.status = 'Rejected';
            showToast(`${employee.shopName} collaboration rejected.`);
        }
        localStorage.setItem('farmfura_employees', JSON.stringify(employees));
        renderEmployeesPage();
    }

    // Event Listeners
    loginBtn.addEventListener('click', () => {
        if (document.getElementById('admin-password').value === ADMIN_PASSWORD) {
            loginWrapper.style.display = 'none';
            adminPanel.style.display = 'block';
            renderDashboard();
        } else {
            showToast('Invalid Password');
        }
    });

    document.querySelectorAll('#admin-panel .nav-link').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const pageId = e.target.getAttribute('href').substring(1);
            switchPage(pageId);
            if (pageId === 'dashboard-page') renderDashboard();
            if (pageId === 'employees-page') renderEmployeesPage();
            if (pageId === 'farmer-prices-page') renderFarmerPricesPage();
        });
    });

    // Init
});
</script>
</body>
</html>
