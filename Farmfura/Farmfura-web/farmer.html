<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmfura - Farmer Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .nav-link { transition: all 0.3s ease; border-bottom: 2px solid transparent; }
        .nav-link.active { color: #16a34a; border-bottom-color: #16a34a; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .modal-backdrop {
            position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.6);
            display: none; align-items: center; justify-content: center; z-index: 120;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-backdrop.visible { display: flex; opacity: 1; }
        .modal-content {
            background: white; padding: 2rem; border-radius: 0.75rem;
            max-width: 500px; width: 90%;
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        .modal-backdrop.visible .modal-content { transform: scale(1); }
    </style>
</head>
<body class="bg-gray-100">

    <header id="app-header" class="bg-white shadow-sm sticky top-0 z-50 hidden">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="text-3xl font-bold text-green-700 italic">🌱 Farmfura</div>
                <nav class="flex items-center space-x-6">
                    <a href="#farmer-dashboard-page" class="nav-link active" data-lang-key="nav_dashboard">Dashboard</a>
                    <a href="#my-submissions-page" class="nav-link" data-lang-key="nav_my_submissions">My Submissions</a>
                    <select id="language-switcher" class="block appearance-none bg-white border border-gray-300 px-4 py-2 pr-8 rounded-md text-sm">
                        <option value="en">English</option>
                        <option value="kn">ಕನ್ನಡ</option>
                        <option value="hi">हिन्दी</option>
                    </select>
                    <a href="#" id="logout-button" class="font-semibold text-red-600 hover:text-red-800" data-lang-key="nav_logout">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <main id="app-wrapper" class="hidden">
        <div id="farmer-dashboard-page" class="page active container mx-auto px-4 sm:px-6 lg:px-8 py-8">
             <div class="max-w-4xl mx-auto">
                 <div class="flex justify-between items-start mb-2">
                     <div>
                         <h1 class="text-3xl font-bold text-gray-800" data-lang-key="farmer_dashboard_title">Farmer Dashboard</h1>
                         <p class="text-gray-600" data-lang-key="farmer_dashboard_subtitle">Update your available produce quantity.</p>
                     </div>
                     <button type="button" id="detect-farm-location-btn" class="text-sm text-green-600 hover:underline flex items-center space-x-1 mt-2">
                         <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                         <span data-lang-key="detect_location_btn">Detect Farm Location</span>
                     </button>
                 </div>
                 <div id="farm-location-display" class="text-sm text-gray-700 mb-6 h-5"></div>
                 
                 <div class="mb-6 relative flex items-center">
                     <div class="relative w-full">
                         <input type="text" id="farmer-search-input" placeholder="Search for your product..." class="w-full p-3 pl-10 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                         <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                     </div>
                     <button id="farmer-voice-search-btn" class="ml-2 p-3 bg-white border rounded-md text-gray-500 hover:text-green-600 hover:border-green-500" title="Search by Voice">
                         <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
                     </button>
                 </div>

                 <div id="farmer-product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                 <div class="mt-8 pt-4 border-t-2 border-gray-200 flex justify-between items-center">
                     <div>
                         <span class="text-lg font-bold text-gray-700 mr-4" data-lang-key="farmer_total_earnings">Total Potential Earnings:</span>
                         <span id="farmer-total-earnings" class="text-xl font-bold text-green-700">₹0.00</span>
                     </div>
                     <button id="farmer-submit-btn" class="bg-green-600 text-white font-bold py-3 px-6 rounded-md hover:bg-green-700 transition" data-lang-key="farmer_submit_btn">Submit Availability</button>
                 </div>
             </div>
        </div>
        
        <div id="my-submissions-page" class="page container mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-3xl font-bold text-gray-800 mb-6" data-lang-key="my_submissions_title">My Submissions</h1>
                <div id="submissions-list" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <div id="login-wrapper" class="min-h-screen flex items-center justify-center bg-gray-50 relative">
        <div class="absolute top-6 right-6">
            <select id="login-language-switcher" class="block appearance-none bg-white border border-gray-300 px-4 py-2 pr-8 rounded-md shadow-sm text-sm">
                <option value="en">English</option> <option value="kn">ಕನ್ನಡ</option> <option value="hi">हिन्दी</option>
            </select>
        </div>
        <div class="mx-auto w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="text-5xl font-bold text-green-700 italic mb-4">🌱 Farmfura</div>
                <p id="login-quote" class="text-gray-600 italic h-12" data-lang-key="login_quote"></p>
            </div>
            <div class="bg-white p-8 shadow-lg rounded-lg">
                <h2 class="text-2xl font-bold text-center text-gray-800 mb-6" data-lang-key="farmer_login_title">Farmer Login</h2>
                <div class="space-y-4">
                    <div>
                        <label for="login-credential" class="block text-gray-700 text-sm font-bold mb-2" data-lang-key="phone_number_label">Phone Number</label>
                        <input type="text" id="login-credential" class="w-full py-3 px-4 border rounded-md" placeholder="Enter 10-digit phone number" required>
                    </div>
                    <div id="otp-field-container" class="hidden">
                        <label for="login-otp" class="block text-gray-700 text-sm font-bold mb-2" data-lang-key="otp_label">Enter OTP</label>
                        <input type="text" id="login-otp" class="w-full py-3 px-4 border rounded-md" placeholder="Enter OTP">
                    </div>
                    <button id="universal-login-btn" type="button" class="w-full bg-green-600 text-white font-bold py-3 rounded-md hover:bg-green-700" data-lang-key="send_otp_btn">Send OTP</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast-message" class="fixed bottom-4 left-1/2 -translate-x-1/2 p-4 rounded-lg shadow-xl text-white bg-green-600 opacity-0 z-[101]"></div>
    <div id="quantity-modal" class="modal-backdrop"></div>
    <div id="onboarding-modal" class="modal-backdrop"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- DATA ---
    const allProducts = JSON.parse(localStorage.getItem('farmfura_products')) || [];

    const translations = {
        en: { 
            nav_dashboard: 'Dashboard', nav_my_submissions: 'My Submissions', nav_logout: 'Logout',
            farmer_dashboard_title: 'Farmer Dashboard', farmer_dashboard_subtitle: 'Update your available produce quantity.',
            detect_location_btn: 'Detect Farm Location', farmer_total_earnings: 'Total Potential Earnings:',
            farmer_submit_btn: 'Submit Availability', my_submissions_title: 'My Submissions', no_submissions: 'You have no submissions yet.',
            unit_kg: 'kg', unit_bundle: 'bundle', unit_piece: 'piece', unit_pack: 'pack',
            pickup_message_success: 'Availability submitted! The Supply Grid Manager has been notified.',
            add_quantity_btn: 'Add Quantity',
            login_quote: '"The ultimate goal of farming is not the growing of crops, but the cultivation and perfection of human beings."',
            farmer_login_title: 'Farmer Login', phone_number_label: 'Phone Number', otp_label: 'Enter OTP',
            send_otp_btn: 'Send OTP', verify_login_btn: 'Verify & Login',
            welcome_title: 'Welcome to Farmfura!', enter_name_prompt: 'Please enter your name to complete registration.',
            name_label: 'Your Name', complete_registration_btn: 'Complete Registration'
        },
        kn: { /* Kannada translations */ },
        hi: { /* Hindi translations */ }
    };

    // --- STATE ---
    let currentLang = 'en';
    let stagedItems = {}; 
    let farmerId = null;
    let otpSent = false;
    let generatedOtp = '';
    const savedState = localStorage.getItem('farmfura_farmerState');
    let userState = savedState ? JSON.parse(savedState) : {};

    // --- DOM ELEMENTS ---
    const pages = document.querySelectorAll('.page');
    const toastMessage = document.getElementById('toast-message');
    // ... all other DOM element queries

    // --- UTILITY FUNCTIONS ---
    function switchPage(targetId) { /* ... */ }
    function showToastMessage(message, duration = 3000) { /* ... */ }
    function getUnitText(unit, lang) { return translations[lang][`unit_${unit}`] || unit; }
    function applyTranslations() { /* ... */ }

    // --- LOGIN & ONBOARDING ---
    function handleLoginVerification() {
        const phone = document.getElementById('login-credential').value.trim();
        farmerId = phone; 
        if (userState[farmerId] && userState[farmerId].hasOnboarded) {
            showApp();
        } else {
            renderOnboardingModal();
        }
    }

    function renderOnboardingModal() {
        const modal = document.getElementById('onboarding-modal');
        modal.innerHTML = `
            <div class="modal-content">
                <h2 class="text-2xl font-bold mb-4" data-lang-key="welcome_title">${translations[currentLang].welcome_title}</h2>
                <p class="mb-6 text-gray-600" data-lang-key="enter_name_prompt">${translations[currentLang].enter_name_prompt}</p>
                <form id="onboarding-form">
                    <label for="farmer-name" class="block text-sm font-bold mb-2" data-lang-key="name_label">${translations[currentLang].name_label}</label>
                    <input type="text" id="farmer-name" class="w-full py-3 px-4 border rounded-md mb-6" required>
                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-md" data-lang-key="complete_registration_btn">${translations[currentLang].complete_registration_btn}</button>
                </form>
            </div>`;
        modal.classList.add('visible');
        document.getElementById('onboarding-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const farmerName = document.getElementById('farmer-name').value.trim();
            if (farmerName) {
                userState[farmerId] = { hasOnboarded: true, name: farmerName, location: null };
                localStorage.setItem('farmfura_farmerState', JSON.stringify(userState));
                modal.classList.remove('visible');
                showApp();
            }
        });
    }

    function showApp() {
        document.getElementById('login-wrapper').style.display = 'none';
        document.getElementById('app-wrapper').style.display = 'block';
        document.getElementById('app-header').classList.remove('hidden');
        renderFarmerDashboard();
    }

    // --- DASHBOARD & SUBMISSION LOGIC ---
    function renderFarmerDashboard() {
        const productList = document.getElementById('farmer-product-list');
        if (!productList) return;
        productList.innerHTML = allProducts.map(p => `
            <div class="bg-white p-4 rounded-lg shadow-sm flex flex-col justify-between">
                <div>
                    <img src="${p.image}" class="w-full h-32 object-cover rounded-md mb-4" onerror="this.src='https://placehold.co/200x150';">
                    <h3 class="font-bold text-gray-800">${p.name}</h3>
                    <p class="font-semibold text-green-700 mt-2">₹${p.farmerPrice} / ${getUnitText(p.unit, currentLang)}</p>
                </div>
                <div class="mt-4">
                    <button class="add-quantity-btn w-full text-sm bg-green-500 text-white py-2 rounded-md" data-product-id="${p.id}" data-lang-key="add_quantity_btn">${translations[currentLang].add_quantity_btn}</button>
                </div>
            </div>`).join('');
        
        document.querySelectorAll('.add-quantity-btn').forEach(btn => btn.addEventListener('click', () => {
            renderQuantityModal(btn.dataset.productId);
        }));
    }

    function renderQuantityModal(productId) {
        // ... unchanged ...
    }

    function detectLocation() {
        const display = document.getElementById('farm-location-display');
        display.textContent = 'Detecting...';
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                if (userState[farmerId]) {
                    userState[farmerId].location = { lat: latitude, lon: longitude };
                    localStorage.setItem('farmfura_farmerState', JSON.stringify(userState));
                }
                display.textContent = `Location Captured: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                showToastMessage('Farm location detected and saved!');
            }, () => { display.textContent = 'Location access denied.'; });
        } else {
            display.textContent = 'Geolocation is not supported.';
        }
    }

    function handleSubmitAvailability() {
        if (Object.keys(stagedItems).length === 0) {
            showToastMessage('Please add quantity for at least one item.'); return;
        }
        if (!userState[farmerId]?.location) {
            showToastMessage('Please detect your farm location before submitting.'); return;
        }

        const submissionId = "SUB" + Date.now().toString().slice(-6);
        const totalEarnings = Object.keys(stagedItems).reduce((sum, productId) => {
             const product = allProducts.find(p => p.id == productId);
             return sum + (stagedItems[productId] * product.farmerPrice);
        }, 0);
        
        const submissionItems = Object.keys(stagedItems).map(productId => {
            const product = allProducts.find(p => p.id == productId);
            return { id: product.id, name: product.name, qty: stagedItems[productId], unit: product.unit };
        });

        const newSubmission = {
            id: submissionId,
            farmerId: farmerId,
            farmerName: userState[farmerId].name,
            location: userState[farmerId].location,
            timestamp: new Date().toISOString(),
            items: submissionItems,
            total: totalEarnings,
            status: 'pending'
        };

        let allSubmissions = JSON.parse(localStorage.getItem('farmfura_farmer_submissions')) || [];
        allSubmissions.unshift(newSubmission);
        localStorage.setItem('farmfura_farmer_submissions', JSON.stringify(allSubmissions));

        stagedItems = {};
        document.getElementById('farmer-total-earnings').textContent = '₹0.00';
        showToastMessage(translations[currentLang].pickup_message_success);
        renderFarmerDashboard();
        renderMySubmissions(); // Update my submissions page data
    }
    
    function renderMySubmissions() { /* ... unchanged ... */ }

    // --- EVENT LISTENERS ---
    document.getElementById('universal-login-btn').addEventListener('click', () => {
        // ... OTP logic remains the same
    });
    document.getElementById('detect-farm-location-btn').addEventListener('click', detectLocation);
    document.getElementById('farmer-submit-btn').addEventListener('click', handleSubmitAvailability);
    document.getElementById('logout-button').addEventListener('click', () => window.location.reload());
    // ... all other event listeners
    
    // --- INITIALIZE ---
    // ... initial language setup and call to applyTranslations();
});
</script>
</body>
</html>
