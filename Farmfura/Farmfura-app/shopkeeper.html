<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmfura - Shopkeeper Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .page { display: none; }
        .page.active { display: block; }
        .urgent-order { animation: pulse-red 1.5s infinite; border-width: 2px; }
        @keyframes pulse-red { 0%, 100% { border-color: #fca5a5; } 50% { border-color: #ef4444; } }
        .scanned-item { text-decoration: line-through; color: #16a34a; font-weight: bold; background-color: #f0fdf4; }
        #scanner-modal video { width: 100%; height: auto; border-radius: 0.5rem; transform: scaleX(-1); }
    </style>
</head>
<body>

    <div id="login-wrapper" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-bold text-green-700 italic">🌱 Farmfura</h1>
                <p class="mt-2 text-lg text-gray-600">Shopkeeper Portal</p>
            </div>
            <div id="login-container" class="bg-white p-8 rounded-lg shadow-md">
                <!-- Login steps will be rendered by JS -->
            </div>
        </div>
    </div>
    
    <div id="app-wrapper" class="hidden">
        <header class="bg-white shadow-sm sticky top-0 z-50">
            <div id="app-header-content" class="container mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-4">
                <!-- Header content will be rendered by JS -->
            </div>
        </header>
        <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div id="shopkeeper-dashboard-page" class="page"></div>
            <div id="shopkeeper-picking-page" class="page"></div>
        </main>
    </div>

    <div id="scanner-modal" class="fixed inset-0 bg-black bg-opacity-75 flex-col items-center justify-center p-4 hidden z-[120]">
        <div class="bg-white p-4 rounded-lg w-full max-w-md text-center">
            <h3 id="scanner-title" class="text-lg font-bold mb-2">Scan Barcode</h3>
            <div class="relative w-full aspect-square bg-gray-900 rounded-md overflow-hidden">
                <video id="scanner-video" playsinline></video>
                <canvas id="scanner-canvas" class="hidden"></canvas>
                <div class="absolute inset-0 border-4 border-red-500 rounded-md" style="clip-path: inset(25% 20% 25% 20%);"></div>
            </div>
            <button id="close-scanner-btn" class="mt-4 w-full bg-gray-500 text-white font-bold py-2 rounded-md">Cancel</button>
        </div>
    </div>
    
    <div id="toast-message" class="fixed bottom-4 right-4 p-4 rounded-lg shadow-xl text-white bg-blue-600 transition-transform duration-300 translate-x-[120%] z-[150]"></div>

<script src="data-init.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    let currentUser = null;
    let currentOrder = null;
    let packingTimerInterval = null;
    let scannerStream = null;
    let scanRequestId = null;
    
    const notificationSound = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
    const successSound = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.005, decay: 0.2, sustain: 0.1, release: 0.5 } }).toDestination();
    const errorSound = new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.2 } }).toDestination();

    const getElement = (id) => document.getElementById(id);
    const showToast = (message) => {
        const toast = getElement('toast-message');
        toast.textContent = message;
        toast.classList.remove('translate-x-[120%]');
        setTimeout(() => toast.classList.add('translate-x-[120%]'), 4000);
    };
    
    function renderPhoneStep() {
        getElement('login-container').innerHTML = `
            <h2 class="text-xl font-bold text-center mb-4">Daily Login</h2>
            <p class="text-center text-gray-500 mb-6">Enter your phone number to start your shift.</p>
            <input type="tel" id="login-phone" class="w-full p-3 border rounded-md" placeholder="10-digit phone number">
            <button id="phone-continue-btn" class="mt-4 w-full bg-green-600 text-white font-bold py-3 rounded-md hover:bg-green-700">Continue</button>`;
        getElement('phone-continue-btn').addEventListener('click', handlePhoneSubmit);
    }
    
    function renderFresherApplicationForm(phone) {
        getElement('login-container').innerHTML = `
            <h2 class="text-xl font-bold text-center mb-4">New Shopkeeper Application</h2>
            <p class="text-center text-gray-500 mb-6">Welcome! Please fill out your details to apply.</p>
            <form id="fresher-form" class="space-y-4">
                <input type="text" id="fresher-name" placeholder="Your Full Name" class="w-full p-3 border rounded-md" required>
                <input type="text" id="fresher-phone" value="${phone}" class="w-full p-3 border rounded-md bg-gray-100" readonly>
                <select id="fresher-zone" class="w-full p-3 border rounded-md" required>
                    <option value="">-- Select Your Outlet Zone --</option>
                    <option value="Koramangala">Koramangala</option>
                    <option value="Indiranagar">Indiranagar</option>
                </select>
                <input type="text" id="fresher-shop" placeholder="Outlet/Shop Name (e.g., FreshMart)" class="w-full p-3 border rounded-md" required>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700">Submit Application</button>
                <button type="button" id="back-to-login-btn" class="w-full text-center text-sm text-gray-600 mt-2 hover:underline">← Back to Login</button>
            </form>`;
        getElement('fresher-form').addEventListener('submit', handleFresherApplication);
        getElement('back-to-login-btn').addEventListener('click', renderPhoneStep);
    }
    
    function renderOtpStep(phone) {
        getElement('login-container').innerHTML = `
            <h2 class="text-xl font-bold text-center mb-4">Enter OTP</h2>
            <p class="text-center text-gray-500 mb-6">We've sent an OTP to ${phone}. (For demo, it's 1234)</p>
            <input type="text" id="login-otp" class="w-full p-3 border rounded-md text-center tracking-widest" placeholder="----" maxlength="4">
            <button id="otp-continue-btn" class="mt-4 w-full bg-green-600 text-white font-bold py-3 rounded-md hover:bg-green-700">Verify OTP</button>`;
        getElement('otp-continue-btn').addEventListener('click', handleOtpSubmit);
    }
    
    function renderFacialVerificationStep() {
        getElement('login-container').innerHTML = `
            <h2 class="text-xl font-bold text-center mb-4">Identity Verification</h2>
            <p class="text-center text-gray-500 mb-6">Simulating facial recognition for security.</p>
            <div class="w-48 h-48 mx-auto bg-gray-200 rounded-full flex items-center justify-center mb-4 animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <button id="face-verify-btn" class="mt-4 w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700">Verify Identity (Click to Simulate)</button>`;
        getElement('face-verify-btn').addEventListener('click', () => finalLogin(currentUser));
    }
    
    function renderShopkeeperDashboard() {
        const page = getElement('shopkeeper-dashboard-page');
        page.classList.add('active');
        getElement('shopkeeper-picking-page').classList.remove('active');
        
        const orders = JSON.parse(localStorage.getItem('farmfura_pendingOrders')) || [];
        const myZoneOrders = orders.filter(o => o.zone === currentUser.zone && o.status === 'new');

        page.innerHTML = `
            <div class="bg-white p-6 rounded-lg shadow mb-8">
                <h3 class="font-semibold text-gray-500">Today's Earnings</h3>
                <p class="text-4xl font-bold text-green-600 mt-2">₹${(currentUser.scanEarnings || 0).toFixed(2)}</p>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-4">New Incoming Orders</h2>
            <div id="new-orders-list" class="space-y-4">
                ${myZoneOrders.length > 0 ? myZoneOrders.map(order => `
                    <div class="bg-white p-4 rounded-lg shadow ${order.isUrgent ? 'urgent-order' : 'border-l-4 border-blue-400'}">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold text-lg">Order ID: ${order.id}</p>
                                <p class="text-sm text-gray-600">${order.items.length} items for ${order.customer.name}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold text-green-700">Payout: ₹${order.payout.toFixed(2)}</p>
                                ${order.isUrgent ? '<span class="text-xs font-bold text-red-600 bg-red-100 px-2 py-1 rounded-full">URGENT</span>' : ''}
                            </div>
                        </div>
                        <button class="action-btn-accept mt-4 w-full bg-blue-600 text-white font-bold py-2 rounded-md" data-order-id="${order.id}">Accept & Start Packing</button>
                    </div>
                `).join('') : '<p class="text-center text-gray-500 py-8">No new orders at the moment. Well done!</p>'}
            </div>`;
        document.querySelectorAll('.action-btn-accept').forEach(btn => btn.addEventListener('click', () => startPickingOrder(btn.dataset.orderId)));
    }

    function renderPickingPage() {
        const page = getElement('shopkeeper-picking-page');
        page.innerHTML = `
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center border-b pb-4 mb-4">
                    <div>
                        <h2 class="text-2xl font-bold">Packing Order: <span class="text-blue-600">${currentOrder.id}</span></h2>
                        <p class="text-gray-600">For: ${currentOrder.customer.name}</p>
                    </div>
                    <div id="packing-timer-container" class="text-center">
                        <div id="packing-timer" class="text-4xl font-bold text-gray-800">03:00</div>
                        <p class="text-sm text-gray-500">Time Remaining</p>
                    </div>
                </div>
                <h3 class="font-bold text-lg mb-3">Items to Pick:</h3>
                <ul id="picking-list" class="space-y-3"></ul>
                <div class="mt-6 border-t pt-6">
                    <button id="scan-dock-btn" class="w-full bg-green-600 text-white font-bold py-3 text-lg rounded-md disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>Scan Delivery Dock</button>
                </div>
            </div>`;
        
        updatePickingList();
        startPackingTimer(180, getElement('packing-timer'));
        getElement('scan-dock-btn').addEventListener('click', () => openScanner('dock'));
    }

    function updatePickingList() {
        const list = getElement('picking-list');
        const allItemsScanned = currentOrder.items.every(item => item.scanned);
        
        list.innerHTML = currentOrder.items.map(item => {
            const productDetails = (JSON.parse(localStorage.getItem('farmfura_products')) || []).find(p => p.id === item.id);
            return `<li id="item-${item.id}" class="flex items-center p-3 rounded-md border ${item.scanned ? 'scanned-item border-green-300' : 'bg-gray-50'}">
                <img src="${productDetails?.image || ''}" class="w-16 h-16 rounded-md object-cover mr-4" onerror="this.style.display='none'">
                <div class="flex-grow">
                    <p class="font-bold">${item.name}</p>
                    <p class="text-sm">Quantity: <span class="font-semibold">${item.qty} ${item.unit}</span></p>
                    <p class="text-xs text-blue-600 font-mono">Location: ${productDetails?.storageLocation || 'N/A'}</p>
                </div>
                <button class="scan-item-btn bg-blue-500 text-white px-4 py-2 rounded-md" data-barcode="${item.barcode}" ${item.scanned ? 'disabled' : ''}>Scan</button>
            </li>`;
        }).join('');

        document.querySelectorAll('.scan-item-btn').forEach(btn => btn.addEventListener('click', () => openScanner('item', btn.dataset.barcode)));
        getElement('scan-dock-btn').disabled = !allItemsScanned;
    }

    // --- LOGIC FUNCTIONS (LOGIN, ONBOARDING, PICKING, SCANNING) ---
    function handlePhoneSubmit() { /* ... unchanged ... */ }
    function handleFresherApplication(e) { /* ... unchanged ... */ }
    function handleOtpSubmit() { /* ... unchanged ... */ }

    function finalLogin(user) {
        currentUser = user;
        sessionStorage.setItem('shopkeeperUser', JSON.stringify(user));
        getElement('login-wrapper').style.display = 'none';
        getElement('app-wrapper').style.display = 'block';
        getElement('app-header-content').innerHTML = `
            <div>
                <div class="text-3xl font-bold text-green-700 italic">🌱 Farmfura Outlet</div>
                <span class="text-sm text-gray-600 block">Welcome, ${currentUser.name} | ${currentUser.shopName}</span>
            </div>
            <a href="#" id="logout-button" class="font-semibold text-red-600 hover:text-red-800">Logout</a>`;
        getElement('logout-button').addEventListener('click', () => { sessionStorage.removeItem('shopkeeperUser'); window.location.reload(); });
        renderShopkeeperDashboard();
    }
    
    function startPickingOrder(orderId) { /* ... unchanged ... */ }
    function startPackingTimer(duration, displayElement) { /* ... unchanged ... */ }
    async function openScanner(scanType, expectedBarcode = null) { /* ... unchanged ... */ }
    function tick(canvas, canvasElement, video, scanType, expectedBarcode) { /* ... unchanged ... */ }
    function closeScanner() { /* ... unchanged ... */ }

    function handleScanResult(scannedData, scanType, expectedBarcode) {
        closeScanner();
        if (scanType === 'item') {
            const itemToScan = currentOrder.items.find(item => item.barcode === expectedBarcode && !item.scanned);
            if (itemToScan && scannedData === expectedBarcode) {
                itemToScan.scanned = true;
                successSound.triggerAttackRelease("G5", "0.2");
                showToast(`${itemToScan.name} scanned!`);
                updateOrderInLocalStorage();
                updatePickingList();
            } else {
                errorSound.triggerAttackRelease("C3", "0.2");
                showToast("Wrong item scanned. Please try again.");
            }
        } else if (scanType === 'dock') {
            if (scannedData === 'DELIVERY-DOCK') {
                successSound.triggerAttackRelease("C6", "0.3");
                currentOrder.status = 'ready';
                currentOrder.deliveryDock = `Rack A-${Math.floor(Math.random() * 5) + 1}`;
                currentOrder.readyAt = new Date().toISOString();
                updateOrderInLocalStorage();
                
                let notifications = JSON.parse(localStorage.getItem('farmfura_notifications')) || [];
                notifications.unshift({ message: `Order ${currentOrder.id} is ready for pickup at ${currentOrder.deliveryDock}.`, priority: 'urgent', targetRole: 'bike_carrier', targetZone: currentUser.zone, timestamp: new Date(), read: false });
                localStorage.setItem('farmfura_notifications', JSON.stringify(notifications));

                showToast(`Order placed in ${currentOrder.deliveryDock}. Carrier notified!`);
                clearInterval(packingTimerInterval);
                currentOrder = null;
                setTimeout(() => renderShopkeeperDashboard(), 1000);
            } else {
                errorSound.triggerAttackRelease("C3", "0.2");
                showToast("Incorrect QR. Please scan the Delivery Dock QR.");
            }
        }
    }
    
    function updateOrderInLocalStorage() { /* ... unchanged ... */ }
    
    window.addEventListener('storage', (event) => {
        if (event.key === 'farmfura_pendingOrders' && currentUser) {
            // ... Real-time notification logic ...
        }
    });

    function init() {
        const savedUser = sessionStorage.getItem('shopkeeperUser');
        if (savedUser) { finalLogin(JSON.parse(savedUser)); } 
        else { renderPhoneStep(); }
        getElement('close-scanner-btn').addEventListener('click', closeScanner);
    }
    
    init();
});
</script>
</body>
</html>
