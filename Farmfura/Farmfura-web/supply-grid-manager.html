<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmfura - Supply Grid Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .page, .tab-content { display: none; }
        .page.active, .tab-content.active { display: block; }
        .nav-link { transition: all 0.3s ease; border-bottom: 2px solid transparent; cursor: pointer; padding: 0.5rem 0.25rem; white-space: nowrap; }
        .nav-link.active { color: #16a34a; border-bottom-color: #16a34a; font-weight: 600; }
        .modal-backdrop {
            position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.6);
            display: none; align-items: center; justify-content: center; z-index: 120;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-backdrop.visible { display: flex; opacity: 1; }
        .modal-content { background: white; padding: 1.5rem; border-radius: 0.5rem; width: 90%; max-width: 500px; }
        .kpi-card { background-color: white; padding: 1.5rem; border-radius: 0.75rem; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
        .kpi-card .value { font-size: 2.25rem; font-weight: 700; }
        .kpi-card .label { color: #6b7280; font-weight: 500; }
    </style>
</head>
<body>

    <div id="login-wrapper" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-bold text-green-700 italic">🌱 Farmfura</h1>
                <p class="mt-2 text-lg text-gray-600">Supply Grid Portal</p>
            </div>
            <div class="bg-white p-8 rounded-lg shadow-md">
                <input type="tel" id="login-phone" class="w-full p-3 border rounded-md mb-4" placeholder="10-digit phone number" value="9111111111">
                <input type="password" id="login-password" class="w-full p-3 border rounded-md mb-4" placeholder="Password" value="password123">
                <button id="login-btn" class="w-full bg-green-600 text-white font-bold py-3 rounded-md">Login</button>
            </div>
        </div>
    </div>

    <div id="app-wrapper" class="hidden">
        <header class="bg-white shadow-sm sticky top-0 z-50">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div>
                        <div class="text-3xl font-bold text-green-700 italic">🌱 Supply Grid</div>
                        <span id="welcome-message" class="text-sm text-gray-600 block"></span>
                    </div>
                    <a href="#" id="logout-button" class="font-semibold text-red-600 hover:text-red-800">Logout</a>
                </div>
                <nav id="main-tabs" class="flex items-center space-x-4 md:space-x-6 border-b -mb-px overflow-x-auto">
                    <span class="nav-link active" data-tab="dashboard">Dashboard</span>
                    <span class="nav-link" data-tab="procurement">Procurement</span>
                    <span class="nav-link" data-tab="dispatch">Dispatch</span>
                    <span class="nav-link" data-tab="inventory">Inventory</span>
                    <span class="nav-link" data-tab="logistics">Logistics</span>
                </nav>
            </div>
        </header>

        <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div id="dashboard-content" class="tab-content active"></div>
            <div id="procurement-content" class="tab-content"></div>
            <div id="dispatch-content" class="tab-content"></div>
            <div id="inventory-content" class="tab-content"></div>
            <div id="logistics-content" class="tab-content"></div>
        </main>
    </div>

    <div id="modal-backdrop" class="modal-backdrop">
        <div id="modal-content" class="modal-content"></div>
    </div>
    <div id="toast-message" class="fixed bottom-4 left-1/2 -translate-x-1/2 p-4 rounded-lg shadow-xl text-white bg-blue-600 opacity-0 z-[150]"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- STATE & MOCK DATA ---
    let currentUser = null;

    // --- DOM ELEMENTS ---
    const loginWrapper = document.getElementById('login-wrapper');
    const appWrapper = document.getElementById('app-wrapper');
    const toastMessage = document.getElementById('toast-message');

    // --- UTILITY ---
    const showToast = (message) => { /* ... */ };
    const showModal = (content) => { /* ... */ };
    window.closeModal = () => { document.getElementById('modal-backdrop').classList.remove('visible'); };

    // --- RENDER FUNCTIONS ---
    function renderDashboard() {
        const procurementData = JSON.parse(localStorage.getItem('farmfura_farmer_submissions')) || [];
        const bulkOrders = JSON.parse(localStorage.getItem('farmfura_bulk_orders')) || [];
        const inventory = JSON.parse(localStorage.getItem('farmfura_supply_grid_inventory')) || {};
        
        const pendingPickups = procurementData.filter(s => s.status === 'pending').length;
        const pendingBulkOrders = bulkOrders.filter(o => o.status === 'pending').length;
        const lowStockItems = Object.keys(inventory).filter(id => inventory[id] < 50).length;

        document.getElementById('dashboard-content').innerHTML = `
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Grid Overview</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="kpi-card"><div class="value text-blue-600">${pendingPickups}</div><div class="label">Pending Farmer Pickups</div></div>
                <div class="kpi-card"><div class="value text-purple-600">${pendingBulkOrders}</div><div class="label">Pending Bulk Orders</div></div>
                <div class="kpi-card"><div class="value text-red-600">${lowStockItems}</div><div class="label">Low Stock Items (< 50 units)</div></div>
            </div>`;
    }

    function renderProcurement() {
        const submissions = (JSON.parse(localStorage.getItem('farmfura_farmer_submissions')) || []).filter(s => s.status === 'pending');
        document.getElementById('procurement-content').innerHTML = `
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Farmer Submissions</h2>
            <div class="space-y-4">
                ${submissions.length > 0 ? submissions.map(sub => `
                    <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-400">
                        <p class="font-bold">ID: ${sub.id} | Farmer: ${sub.farmerName}</p>
                        <p class="text-sm text-gray-600">${sub.items.map(i => `${i.name} (${i.qty} ${i.unit})`).join(', ')}</p>
                        <p class="font-semibold text-green-700 mt-2">Total Value: ₹${sub.total.toFixed(2)}</p>
                        <button class="action-btn mt-3 bg-green-500 text-white px-4 py-1 text-sm rounded" data-action="accept-submission" data-id="${sub.id}">Accept & Schedule Pickup</button>
                    </div>
                `).join('') : '<p class="text-center text-gray-500">No pending farmer submissions.</p>'}
            </div>`;
    }

    function renderDispatch() {
        const bulkOrders = (JSON.parse(localStorage.getItem('farmfura_bulk_orders')) || []).filter(o => o.status === 'pending');
        document.getElementById('dispatch-content').innerHTML = `
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Partner Shop Bulk Orders</h2>
             <div class="space-y-4">
                ${bulkOrders.length > 0 ? bulkOrders.map(order => `
                    <div class="bg-white p-4 rounded-lg shadow border-l-4 border-purple-400">
                        <p class="font-bold">Order ID: ${order.id} | Shop: ${order.outletName}</p>
                        <p class="text-sm text-gray-600">${order.items.map(i => `${i.name} (${i.qty} ${i.unit})`).join(', ')}</p>
                        <p class="font-semibold text-green-700 mt-2">Total Value: ₹${order.total.toFixed(2)}</p>
                        <button class="action-btn mt-3 bg-blue-500 text-white px-4 py-1 text-sm rounded" data-action="prepare-bulk-order" data-id="${order.id}">Prepare for Dispatch</button>
                    </div>
                `).join('') : '<p class="text-center text-gray-500">No pending bulk orders.</p>'}
            </div>`;
    }

    function renderInventory() { /* ... unchanged ... */ }

    function renderLogistics() {
        const farmerJobs = (JSON.parse(localStorage.getItem('farmfura_farmer_submissions')) || []).filter(s => s.status === 'accepted_pending_pickup');
        const shopJobs = (JSON.parse(localStorage.getItem('farmfura_bulk_orders')) || []).filter(o => o.status === 'prepared_for_dispatch');
        
        document.getElementById('logistics-content').innerHTML = `
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Logistics Assignments</h2>
            <div class="space-y-4">
                ${[...farmerJobs, ...shopJobs].length > 0 ? [...farmerJobs, ...shopJobs].map(job => `
                    <div class="bg-white p-4 rounded-lg shadow">
                        <p class="font-bold">${job.farmerName ? 'Pickup from Farmer' : 'Delivery to Shop'}: ${job.id}</p>
                        <p class="text-sm text-gray-600">To/From: ${job.farmerName || job.outletName}</p>
                        <button class="action-btn mt-2 bg-gray-800 text-white px-3 py-1 rounded text-xs" data-action="assign-carrier" data-id="${job.id}" data-type="${job.farmerName ? 'pickup' : 'delivery'}">Assign 4x4 Carrier</button>
                    </div>
                `).join('') : '<p class="text-center text-gray-500">No jobs waiting for assignment.</p>'}
            </div>`;
    }

    // --- LOGIC ---
    function handleLogin() { /* ... login logic ... */ }

    function finalLogin(user) {
        currentUser = user;
        loginWrapper.style.display = 'none';
        appWrapper.style.display = 'block';
        document.getElementById('welcome-message').textContent = `Welcome, ${currentUser.name}`;
        switchTab('dashboard');
    }

    function switchTab(tabName) { /* ... unchanged ... */ }

    function handleJobAction(e) {
        const action = e.target.dataset.action;
        const id = e.target.dataset.id;
        const type = e.target.dataset.type;

        if (action === 'accept-submission') {
            let submissions = JSON.parse(localStorage.getItem('farmfura_farmer_submissions'));
            const sub = submissions.find(s => s.id === id);
            if (sub) {
                sub.status = 'accepted_pending_pickup';
                localStorage.setItem('farmfura_farmer_submissions', JSON.stringify(submissions));
                showToast(`Submission ${id} accepted.`);
                renderProcurement(); renderLogistics();
            }
        }
        if (action === 'prepare-bulk-order') {
            let orders = JSON.parse(localStorage.getItem('farmfura_bulk_orders'));
            let inventory = JSON.parse(localStorage.getItem('farmfura_supply_grid_inventory'));
            const order = orders.find(o => o.id === id);
            if(order) {
                // Deduct from inventory
                order.items.forEach(item => { if(inventory[item.id]) { inventory[item.id] -= item.qty; } });
                order.status = 'prepared_for_dispatch';
                localStorage.setItem('farmfura_bulk_orders', JSON.stringify(orders));
                localStorage.setItem('farmfura_supply_grid_inventory', JSON.stringify(inventory));
                showToast(`Order ${id} prepared.`);
                renderDispatch(); renderLogistics();
            }
        }
        if (action === 'assign-carrier') {
            const carriers = (JSON.parse(localStorage.getItem('farmfura_employees')) || []).filter(e => e.role === '4x4_carrier' && e.status === 'Active');
            showModal(`...`); // Modal content for carrier selection
        }
        if (action === 'confirm-assign') {
            // ... complex logic as in previous steps, but now handles 'delivery' type correctly
            // by fetching shop owner's location from the employees list.
        }
    }

    // --- REAL-TIME LISTENERS ---
    window.addEventListener('storage', (event) => {
        if (!currentUser) return;
        if (event.key === 'farmfura_farmer_submissions' || event.key === 'farmfura_bulk_orders') {
            const oldData = JSON.parse(event.oldValue || '[]');
            const newData = JSON.parse(event.newValue || '[]');
            if (newData.length > oldData.length) {
                showToast(`🔔 New ${event.key.includes('farmer') ? 'Farmer Submission' : 'Bulk Order'} received!`);
            }
            // Refresh current view
            const activeTab = document.querySelector('#main-tabs .nav-link.active')?.dataset.tab;
            if (activeTab) switchTab(activeTab);
        }
    });

    // --- INITIALIZATION ---
    document.getElementById('main-tabs').addEventListener('click', e => {
        if (e.target.matches('.nav-link')) switchTab(e.target.dataset.tab);
    });
    document.body.addEventListener('click', e => {
        if (e.target.matches('.action-btn')) handleJobAction(e);
    });
    // ... other initial listeners
});
</script>
</body>
</html>
