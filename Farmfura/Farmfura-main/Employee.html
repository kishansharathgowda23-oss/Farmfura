<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

<style>
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    .page, .tab-content, .login-step { display: none; }
    .page.active, .tab-content.active, .login-step.active { display: block; }
    .nav-link { transition: all 0.3s ease; border-bottom: 2px solid transparent; cursor: pointer; padding-bottom: 0.5rem; }
    .nav-link.active { color: #16a34a; border-bottom-color: #16a34a; font-weight: 600; }
    .role-card { transition: all 0.2s ease-in-out; border: 1px solid #e5e7eb; }
    .role-card:hover { transform: translateY(-4px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
    .modal-backdrop { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.6); display: none; align-items: center; justify-content: center; z-index: 120; opacity: 0; transition: opacity 0.3s ease; }
    .modal-backdrop.visible { display: flex; opacity: 1; }
    .modal-content { background: white; padding: 1.5rem; border-radius: 0.5rem; width: 90%; max-width: 500px; }
    .task-item.completed { text-decoration: line-through; color: #6b7280; }
    .scanned-item { text-decoration: line-through; color: #16a34a; font-weight: bold; background-color: #f0fdf4; }
    #scanner-modal video { width: 100%; height: auto; border-radius: 0.5rem; transform: scaleX(-1); }
    .urgent-order { animation: pulse-red 1.5s infinite; border-width: 2px; }
    @keyframes pulse-red { 0%, 100% { border-color: #fca5a5; } 50% { border-color: #ef4444; } }
    .pulse-green { animation: pulse-green 1.5s infinite; }
    @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); } }
    .pulse-blue { animation: pulse-blue 1.5s infinite; }
    @keyframes pulse-blue { 0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } }
</style>
